name: Lisan al-Gaib
description: >
  Supply-chain security gate that fails if newly added/updated packages were
  published less than a configurable number of days ago. Supports npm/pnpm/yarn/bun,
  Python (uv), Rust (Bazel crate.spec), and Java (Bazel maven_install).

inputs:
  ecosystems:
    description: Comma-separated list of ecosystems to check (npm, python, rust, java, bazel, actions)
    required: true
  min-age-days:
    description: Minimum number of days since publication to pass
    required: false
    default: "14"
  warn-age-days:
    description: >
      Age threshold for warnings. Dependencies older than min-age-days but
      younger than warn-age-days produce warnings instead of failures.
    required: false
    default: "21"
  base-ref:
    description: >
      Git ref to diff against. If empty, auto-detects based on event type:
      pull_request uses the PR base SHA, push uses the before SHA,
      merge_group uses the merge group base SHA, release uses target_commitish,
      and other events (schedule, workflow_dispatch, etc.) use HEAD~1.
    required: false
    default: ""
  node-lockfiles:
    description: >
      Newline-separated glob patterns for Node.js lockfiles. Supports
      pnpm-lock.yaml, package-lock.json, yarn.lock, and bun.lock.
      If empty, auto-detects changed lockfiles from the diff.
    required: false
    default: ""
  python-lockfiles:
    description: >
      Newline-separated glob patterns for Python lockfiles. Supports
      uv.lock and pylock.toml (PEP 751).
      If empty, auto-detects changed lockfiles from the diff.
    required: false
    default: ""
  module-bazel:
    description: Path to root MODULE.bazel file (used by rust, java, and bazel ecosystems)
    required: false
    default: MODULE.bazel
  module-bazel-lock:
    description: Path to MODULE.bazel.lock file (used by bazel ecosystem)
    required: false
    default: MODULE.bazel.lock
  workflow-files:
    description: >
      Newline-separated glob patterns for GitHub Actions workflow files.
      If empty, auto-detects changed files from .github/workflows/*.yml,
      .github/workflows/*.yaml, action.yml, and action.yaml.
    required: false
    default: ""
  github-token:
    description: >
      GitHub token for API queries (used by actions and bazel ecosystems
      to check commit/tag dates and BCR publish dates).
    required: false
    default: ${{ github.token }}
  bcr-url:
    description: Bazel Central Registry URL
    required: false
    default: "https://bcr.bazel.build"
  npm-registry-url:
    description: npm registry URL to query for publish dates
    required: false
    default: "https://registry.npmjs.org"
  pypi-registry-url:
    description: PyPI registry URL to query for publish dates
    required: false
    default: "https://pypi.org"
  crates-registry-url:
    description: crates.io registry URL to query for publish dates
    required: false
    default: "https://crates.io"
  strict-third-party:
    description: >
      When true, archive_override without a Last-Modified header and
      third-party actions pinned to a branch (owner ≠ current repo owner)
      are treated as failures instead of warnings.
    required: false
    default: "false"
  bypass-keyword:
    description: >
      If non-empty, failures are downgraded to warnings when this exact
      string is found on its own line in the PR body, as a PR label, or
      on its own line in the HEAD commit message. Useful for emergency
      0-day vulnerability fixes. If using label-based bypass, add
      labeled and unlabeled to pull_request event types.
    required: false
    default: ""
  check-all-on-new-workflow:
    description: >
      When true, if the workflow file that triggered this run was newly added
      (not present in the base ref), all packages are checked — not just
      changed ones. Set to "false" to disable.
    required: false
    default: "true"
  maven-registry-url:
    description: >
      Maven Central registry URL. Used as the default when querying
      maven.install() repositories that point to Maven Central.
    required: false
    default: "https://repo1.maven.org/maven2"

  allowed-licenses:
    description: >
      Comma-separated list of allowed SPDX license identifiers. Each
      analyzed dependency's license is fetched from its registry and
      checked against this list. Set to empty string to skip license
      checking. Defaults to a set of common permissive licenses
      (MIT, ISC, BSD-2-Clause, BSD-3-Clause, Apache-2.0, etc.).
    required: false
    default: "auto"

outputs:
  total-checked:
    description: Number of packages checked (excludes unknown)
  total-failures:
    description: Number of packages that failed the age gate
  total-warnings:
    description: Number of packages in the warning zone
  license-violations:
    description: Number of packages with incompatible licenses

runs:
  using: node24
  main: dist/index.js
