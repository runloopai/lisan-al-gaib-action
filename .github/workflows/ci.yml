name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-slim
    steps:
      - uses: runloopai/checkout@main
      - uses: runloopai/pnpm-action@master
        with:
          version: ^10.16
      - uses: runloopai/setup-node@main
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type Check
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Check dist is up to date
        run: |
          if ! git diff --quiet dist/; then
            echo "::error::dist/ is out of date. Run 'pnpm build' and commit the result."
            git diff --stat dist/
            exit 1
          fi

